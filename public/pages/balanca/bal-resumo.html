<div class="clean-form resumo" style="background: #f1f5f9; padding: 20px;">
  <div class="clean-form__body">

    <div class="clean-toolbar resumo__toolbar">
      <div class="resumo__head">
        <h2 class="clean-title resumo__title">📊 Resumo de Movimentação (Quilos)</h2>
        <div class="clean-help resumo__subtitle">Consolidado de cargas finalizadas por cliente e material.</div>
      </div>

      <div class="resumo__filters">
        <label class="resumo__filter">
          <small>Início:</small>
          <input type="date" id="res_data_inicio">
        </label>
        <label class="resumo__filter">
          <small>Fim:</small>
          <input type="date" id="res_data_fim">
        </label>
        <button id="btnFiltrarResumo" type="button">🔍 FILTRAR</button>
      </div>
    </div>

    <section class="resumo__cota-container" style="background: #fff; border-radius: 12px; padding: 20px; border: 2px solid #0f172a; margin-bottom: 20px;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <h3 style="margin: 0; font-size: 1.1rem; font-weight: 900; color: #0f172a;">🎯 ACOMPANHAMENTO DE COTAS</h3>

        <button onclick="window.location.hash = '#/bal-cotas-gestao'" class="clean-btn" 
                style="background: #f8fafc; border: 2px solid #0f172a; padding: 8px 16px; border-radius: 8px; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 8px;">
          ⚙️ CONFIGURAR COTAS
        </button>
      </div>
      
      <div id="lista-cotas-clientes">
        <p style="color: #64748b; font-size: 13px; font-style: italic;">Buscando cotas configuradas no sistema...</p>
      </div>
    </section>

    <div class="clean-grid clean-grid--2 resumo__grid">

      <section class="clean-section resumo__card resumo__card--cliente">
        <h3 class="resumo__cardTitle resumo__cardTitle--cliente">🚚 Total por Cliente</h3>
        <div class="resumo__tableOnly">
          <div class="table-scroll">
            <table class="resumo-table">
              <thead>
                <tr>
                  <th>CLIENTE</th>
                  <th class="t-center">VIAGENS</th>
                  <th class="t-right">TOTAL (KG)</th>
                </tr>
              </thead>
              <tbody id="tbodyResumoCliente"></tbody>
            </table>
          </div>
        </div>
        <div class="resumo__cardsOnly" id="cardsResumoCliente"></div>
      </section>

      <section class="clean-section resumo__card resumo__card--material">
        <h3 class="resumo__cardTitle resumo__cardTitle--material">📦 Total por Material</h3>
        <div class="resumo__tableOnly">
          <div class="table-scroll">
            <table class="resumo-table">
              <thead>
                <tr>
                  <th>MATERIAL</th>
                  <th class="t-center">VIAGENS</th>
                  <th class="t-right">TOTAL (KG)</th>
                </tr>
              </thead>
              <tbody id="tbodyResumoMaterial"></tbody>
            </table>
          </div>
        </div>
        <div class="resumo__cardsOnly" id="cardsResumoMaterial"></div>
        
        <div class="resumo__actions">
          <button id="btnImprimirResumo" class="clean-btn resumo__print" type="button">
            🖨️ IMPRIMIR RELATÓRIO COMPLETO
          </button>
        </div>
      </section>

    </div>
  </div>
</div>
