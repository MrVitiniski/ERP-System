<div class="clean-form">
  <div class="clean-form__body">
    
    <div class="clean-toolbar">
      <div>
        <h2 class="clean-title">Histórico de Pesagens Rodoviárias</h2>
        <div class="clean-help">Lista de todas as pesagens realizadas e tickets pendentes.</div>
      </div>
      <div>
        <button id="btnAtualizarBalanca" class="clean-btn clean-btn--sm">🔄 Atualizar Lista</button>
      </div>
    </div>

    <div class="clean-section" style="background: #fff; border-radius: 12px; padding: 0; border: 1px solid #e2e8f0; overflow: hidden;">
        <table style="width: 100%; border-collapse: collapse;">
            <thead>
                <tr style="background: #f8fafc; border-bottom: 2px solid #e2e8f0;">
                    <th style="padding: 15px; text-align: left; color: #475569; font-size: 0.85rem;">TICKET / PLACA</th>
                    <th style="padding: 15px; text-align: left; color: #475569; font-size: 0.85rem;">NF / MATERIAL</th>
                    <th style="padding: 15px; text-align: left; color: #475569; font-size: 0.85rem;">MOTORISTA / TRANSP.</th>
                    <th style="padding: 15px; text-align: left; color: #475569; font-size: 0.85rem;">ENTRADA</th>
                    <th style="padding: 15px; text-align: left; color: #475569; font-size: 0.85rem;">SAÍDA</th>
                    <th style="padding: 15px; text-align: left; color: #475569; font-size: 0.85rem;">LÍQUIDO (KG)</th>
                    <th style="padding: 15px; text-align: center; color: #475569; font-size: 0.85rem;">STATUS</th>
                    <th style="padding: 15px; text-align: center; color: #475569; font-size: 0.85rem;">AÇÕES</th>
                </tr>
            </thead>
            <tbody id="tbodyHistoricoBalanca">
                <!-- Carregado via JS -->
            </tbody>
        </table>
    </div>
  </div>
</div>
