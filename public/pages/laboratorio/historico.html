<div class="clean-form">
  <div class="clean-form__body">
    <div class="clean-toolbar">
      <h2 class="clean-title">Laboratório · Histórico de Análises (SCAVARE)</h2>
    </div>

    <!-- FILTRO DE BUSCA -->
    <div class="clean-section">
      <div class="clean-section__title" style="color: #475569;">Pesquisar Laudos</div>
      <hr class="clean-section__rule">
      <div class="clean-grid" style="background: #f8fafc; padding: 15px; border-radius: 6px; border: 1px solid #e2e8f0;">
        <div class="clean-field c-col-9">
          <div class="clean-label">Filtrar por Nº SCAVARE ou Descrição</div>
          <input type="text" id="buscaLab" class="clean-input" placeholder="Digite para buscar em tempo real...">
        </div>
        <div class="clean-field c-col-3" style="display: flex; align-items: flex-end;">
           <button type="button" class="clean-btn clean-btn--primary" id="btnAtualizarLab" style="width: 100%; background: #0f172a; color: #ffffff; font-weight: bold; height: 42px;">
    🔄 Atualizar Lista
  </button>
</div>
      </div>
    </div>

    <!-- TABELA DE RESULTADOS -->
    <div class="clean-section" style="margin-top:30px;">
      <div class="clean-table-wrap">
        <table class="clean-table">
          <thead>
    <tr>
        <th>ID</th>
        <th>Data Produção</th>
        <th>Hora Registro</th> <!-- ADICIONE ESTA LINHA AQUI -->
        <th>Descrição</th>
        <th>Fe%</th>
        <th>Ações</th>
    </tr>
</thead>
          <tbody id="tbodyHistLab">
            <tr><td colspan="5" style="text-align:center; padding: 40px; color: #94a3b8;">Buscando histórico...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- MODAL DE LAUDO TÉCNICO DETALHADO -->
<div id="modalLaudo" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9999; align-items:center; justify-content:center; padding: 20px;">
  <div style="background:white; width:100%; max-width:750px; padding:30px; border-radius:8px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); max-height: 90vh; overflow-y: auto;">
    <div style="display:flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #0f172a; padding-bottom: 10px; margin-bottom: 15px;">
        <h3 style="margin:0; color:#0f172a;">Laudo Técnico: <span id="laudo_scavare"></span></h3>
        <button onclick="fecharLaudo()" style="background:none; border:none; font-size:24px; cursor:pointer;">&times;</button>
    </div>
    <div id="conteudoLaudo"></div>
    <div style="display:flex; gap:10px; margin-top:25px;">
        <button onclick="window.print()" class="clean-btn" style="flex:1; background:#64748b; color:white;">Imprimir Laudo</button>
        <button onclick="fecharLaudo()" class="clean-btn" style="flex:1;">Fechar</button>
    </div>
  </div>
</div>
